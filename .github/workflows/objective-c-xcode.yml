name: Build BYANO Tweak

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  THEOS: ${{ github.workspace }}/theos
  API_BASE: https://key.p3nd.fun/api

jobs:
  verify-api:
    name: Verify activation API
    runs-on: ubuntu-24.04
    outputs:
      api_ok: ${{ steps.health.outputs.api_ok }}
    steps:
      - name: Check API health
        id: health
        shell: bash
        env:
          GPSQ_API_KEY: ${{ secrets.GPSQ_API_KEY }}
        run: |
          set -Eeuo pipefail
          response_file="$(mktemp)"

          if [ -n "${GPSQ_API_KEY:-}" ]; then
            encoded_key="$(python3 -c 'import os,urllib.parse; print(urllib.parse.quote(os.environ["GPSQ_API_KEY"], safe=""))')"
            check_url="$API_BASE/health.php?app=$encoded_key"
            auth_args=(
              --header "X-API-Key: $GPSQ_API_KEY"
              --header "Authorization: Bearer $GPSQ_API_KEY"
            )
          else
            echo "::warning::GPSQ_API_KEY is not configured; running a public reachability check only."
            check_url="$API_BASE/health.php"
            auth_args=()
          fi

          set +e
          status="$(curl --silent --show-error --location --connect-timeout 15 --max-time 30 \
            --output "$response_file" --write-out '%{http_code}' \
            "${auth_args[@]}" \
            "$check_url")"
          curl_status=$?
          set -e

          cat "$response_file" || true
          echo

          if [ "$curl_status" -eq 0 ] && [ "$status" != "000" ] && [ "$status" -lt 500 ]; then
            echo "API is reachable (HTTP $status)."
            echo 'api_ok=true' >> "$GITHUB_OUTPUT"
          else
            echo "::warning::API reachability check failed (curl=$curl_status, HTTP=$status); continuing build because API availability must not block compilation."
            echo 'api_ok=true' >> "$GITHUB_OUTPUT"
          fi

  build:
    name: Build rootless DEB
    needs: verify-api
    if: needs.verify-api.outputs.api_ok == 'true'
    runs-on: ubuntu-24.04
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y bash curl git make perl python3 build-essential fakeroot dpkg-dev xz-utils unzip libplist-utils file

      - name: Install Theos
        shell: bash
        run: |
          set -Eeuo pipefail
          rm -rf "$THEOS"
          bash -c "$(curl -fsSL https://raw.githubusercontent.com/theos/theos/master/bin/install-theos)"
          test -x "$THEOS/toolchain/linux/iphone/bin/clang"
          test -n "$(find "$THEOS/sdks" -maxdepth 1 -type d -name '*.sdk' -print -quit)"

      - name: Validate sources
        shell: bash
        run: |
          set -Eeuo pipefail
          for file in Makefile control Tweak.x BYANOMenuViewController.h BYANOMenuViewController.m; do
            test -f "$file" || { echo "Missing file: $file" >&2; exit 1; }
          done

      - name: Build package
        shell: bash
        run: |
          set -Eeuo pipefail
          rm -rf .theos obj packages artifacts
          mkdir -p artifacts/dylibs artifacts/logs
          set +e
          make clean package FINALPACKAGE=1 THEOS_PACKAGE_SCHEME=rootless messages=yes -j1 2>&1 | tee artifacts/logs/build.log
          status=${PIPESTATUS[0]}
          set -e
          if [ "$status" -ne 0 ]; then
            grep -nE 'error:|fatal error:|Undefined symbols|duplicate symbol|ld:|make.*\*\*\*' artifacts/logs/build.log >&2 || true
            exit "$status"
          fi

      - name: Collect artifacts
        shell: bash
        run: |
          set -Eeuo pipefail
          find packages -type f -name '*.deb' -exec cp -f {} artifacts/ \;
          find .theos -type f -name '*.dylib' -exec cp -f {} artifacts/dylibs/ \;
          test -n "$(find artifacts -maxdepth 1 -type f -name '*.deb' -print -quit)"
          test -n "$(find artifacts/dylibs -type f -name '*.dylib' -print -quit)"
          find artifacts -type f \( -name '*.deb' -o -name '*.dylib' \) -print0 | sort -z | xargs -0 sha256sum > artifacts/SHA256SUMS.txt
          printf 'status=success\napi_base=%s\n' "$API_BASE" > artifacts/BUILD_RESULT.txt
          find artifacts -maxdepth 2 -type f -print

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: BYANO-${{ github.run_number }}
          path: artifacts/**
          if-no-files-found: warn
          retention-days: 30